services:
  videodl:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-10}
    image: videodl-api:latest
    container_name: videodl-api
    restart: always
    ports:
      - "19050:19050"
    env_file:
      - .env
    environment:
      VIDEODL_API_DB_FILE: /data/videodl_api.db
      VIDEODL_API_LEGACY_DATA_FILE: /data/videodl_api_data.json
      VIDEODL_DOWNLOAD_TMP_DIR: /data/tmp/videodl_mp_downloads
    volumes:
      - ./data:/data
